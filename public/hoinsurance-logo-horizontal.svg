<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <!-- Background -->
  <rect width="400" height="100" fill="white"/>
  
  <!-- House/Shield Icon -->
  <g transform="translate(10, 8)">
    <!-- Shield shape -->
    <path d="M42 4 L72 18 L72 52 Q72 72 42 82 Q12 72 12 52 L12 18 Z" fill="#0f766e"/>
    <!-- House inside shield -->
    <polygon points="42,22 58,34 58,58 26,58 26,34" fill="white" opacity="0.95"/>
    <!-- Roof -->
    <polygon points="42,18 64,34 20,34" fill="#eab308"/>
    <!-- Door -->
    <rect x="37" y="44" width="10" height="14" fill="#0f766e" rx="2"/>
    <!-- Window left -->
    <rect x="29" y="38" width="7" height="7" fill="#0f766e" rx="1"/>
    <!-- Window right -->
    <rect x="48" y="38" width="7" height="7" fill="#0f766e" rx="1"/>
  </g>

  <!-- Text: HO -->
  <text x="98" y="52" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="38" fill="#0f766e">HO</text>
  <!-- Text: insurance -->
  <text x="98" y="72" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="16" fill="#475569" letter-spacing="3">insurance</text>
  <!-- Dot com -->
  <text x="214" y="52" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="38" fill="#eab308">.com</text>

  <!-- Tagline -->
  <text x="98" y="88" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="10" fill="#94a3b8" letter-spacing="1">FLORIDA HOME INSURANCE SPECIALISTS</text>
</svg>
