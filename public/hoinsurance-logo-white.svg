<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 110" width="480" height="110">
  <defs>
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="black" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Teal background -->
  <rect width="480" height="110" fill="#0f766e"/>

  <!-- === ICON === -->
  <g transform="translate(8, 5)" filter="url(#shadow2)">
    <!-- Hurricane rings (white) -->
    <circle cx="50" cy="52" r="44" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="6"/>
    <circle cx="50" cy="52" r="35" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="3"/>

    <!-- Hurricane arcs (white) -->
    <path d="M50 10 Q88 12 88 52 Q88 82 65 90" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3" stroke-linecap="round"/>
    <path d="M50 10 Q16 14 16 52 Q16 80 36 90" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3" stroke-linecap="round"/>
    <path d="M28 20 Q10 36 14 58" fill="none" stroke="#eab308" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
    <path d="M72 20 Q90 36 86 58" fill="none" stroke="#eab308" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>

    <!-- House body (white) -->
    <polygon points="50,18 82,38 82,82 18,82 18,38" fill="white"/>

    <!-- Roof (yellow) -->
    <polygon points="50,8 90,38 10,38" fill="#eab308"/>
    <line x1="50" y1="8" x2="50" y2="38" stroke="#fde047" stroke-width="1.5" opacity="0.6"/>

    <!-- Door (teal) -->
    <rect x="41" y="56" width="18" height="26" fill="#0f766e" rx="3"/>
    <circle cx="56" cy="70" r="2" fill="#eab308"/>
    <path d="M41 56 Q50 48 59 56" fill="#0f766e"/>

    <!-- Windows -->
    <rect x="22" y="44" width="14" height="13" fill="#0d9488" rx="2" opacity="0.4"/>
    <line x1="29" y1="44" x2="29" y2="57" stroke="white" stroke-width="1"/>
    <line x1="22" y1="50" x2="36" y2="50" stroke="white" stroke-width="1"/>

    <rect x="64" y="44" width="14" height="13" fill="#0d9488" rx="2" opacity="0.4"/>
    <line x1="71" y1="44" x2="71" y2="57" stroke="white" stroke-width="1"/>
    <line x1="64" y1="50" x2="78" y2="50" stroke="white" stroke-width="1"/>

    <!-- Chimney -->
    <rect x="62" y="12" width="8" height="14" fill="white" opacity="0.8"/>

    <!-- Eye -->
    <circle cx="50" cy="52" r="4" fill="#eab308"/>
    <circle cx="50" cy="52" r="2" fill="white"/>
  </g>

  <!-- Divider -->
  <line x1="116" y1="15" x2="116" y2="95" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- Text (white) -->
  <text x="130" y="55" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="42" fill="white" letter-spacing="-1">HO</text>
  <text x="215" y="55" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="42" fill="#eab308" letter-spacing="-1">.com</text>
  <text x="131" y="76" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="15" fill="rgba(255,255,255,0.75)" letter-spacing="5">insurance</text>
  <text x="131" y="93" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="9.5" fill="rgba(255,255,255,0.45)" letter-spacing="1.5">FLORIDA HOME INSURANCE SPECIALISTS</text>
</svg>
