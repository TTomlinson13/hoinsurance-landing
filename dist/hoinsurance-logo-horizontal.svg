<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 110" width="480" height="110">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f766e" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="110" fill="white"/>

  <!-- === ICON: Big House with Hurricane Swirl === -->
  <g transform="translate(8, 5)" filter="url(#shadow)">

    <!-- Hurricane swirl ring behind house (teal circles) -->
    <circle cx="50" cy="52" r="44" fill="none" stroke="#ccfbf1" stroke-width="6"/>
    <circle cx="50" cy="52" r="35" fill="none" stroke="#99f6e4" stroke-width="3"/>

    <!-- Hurricane spiral arcs -->
    <path d="M50 10 Q88 12 88 52 Q88 82 65 90" fill="none" stroke="#0d9488" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <path d="M50 10 Q16 14 16 52 Q16 80 36 90" fill="none" stroke="#0d9488" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <path d="M28 20 Q10 36 14 58" fill="none" stroke="#eab308" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M72 20 Q90 36 86 58" fill="none" stroke="#eab308" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

    <!-- House body -->
    <polygon points="50,18 82,38 82,82 18,82 18,38" fill="#0f766e"/>

    <!-- Roof -->
    <polygon points="50,8 90,38 10,38" fill="#eab308"/>
    <!-- Roof ridge highlight -->
    <line x1="50" y1="8" x2="50" y2="38" stroke="#fde047" stroke-width="1.5" opacity="0.5"/>

    <!-- Door -->
    <rect x="41" y="56" width="18" height="26" fill="#065f46" rx="3"/>
    <!-- Door knob -->
    <circle cx="56" cy="70" r="2" fill="#eab308"/>
    <!-- Door arch top -->
    <path d="M41 56 Q50 48 59 56" fill="#065f46"/>

    <!-- Window left -->
    <rect x="22" y="44" width="14" height="13" fill="#ccfbf1" rx="2"/>
    <line x1="29" y1="44" x2="29" y2="57" stroke="#0f766e" stroke-width="1"/>
    <line x1="22" y1="50" x2="36" y2="50" stroke="#0f766e" stroke-width="1"/>

    <!-- Window right -->
    <rect x="64" y="44" width="14" height="13" fill="#ccfbf1" rx="2"/>
    <line x1="71" y1="44" x2="71" y2="57" stroke="#0f766e" stroke-width="1"/>
    <line x1="64" y1="50" x2="78" y2="50" stroke="#0f766e" stroke-width="1"/>

    <!-- Chimney -->
    <rect x="62" y="12" width="8" height="14" fill="#0f766e"/>
    <rect x="61" y="10" width="10" height="4" fill="#065f46" rx="1"/>

    <!-- Hurricane eye dot -->
    <circle cx="50" cy="52" r="4" fill="#eab308"/>
    <circle cx="50" cy="52" r="2" fill="white"/>

  </g>

  <!-- Divider line -->
  <line x1="116" y1="15" x2="116" y2="95" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- === TEXT === -->
  <!-- HO -->
  <text x="130" y="55" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="42" fill="#0f766e" letter-spacing="-1">HO</text>
  <!-- .com -->
  <text x="215" y="55" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="42" fill="#eab308" letter-spacing="-1">.com</text>

  <!-- insurance -->
  <text x="131" y="76" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="15" fill="#475569" letter-spacing="5">insurance</text>

  <!-- Tagline -->
  <text x="131" y="93" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="9.5" fill="#94a3b8" letter-spacing="1.5">FLORIDA HOME INSURANCE SPECIALISTS</text>
</svg>
