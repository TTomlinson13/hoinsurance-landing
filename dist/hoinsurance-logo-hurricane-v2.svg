<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 110" width="480" height="110">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f766e"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
  </defs>

  <!-- Dark teal background banner -->
  <rect width="480" height="110" fill="url(#bg)" rx="8"/>

  <!-- === HURRICANE ICON (white version) === -->
  <g transform="translate(8,5)">
    <!-- Spiral bands -->
    <path d="M50,4 C85,4 96,20 96,52 C96,78 80,90 65,93" 
          fill="none" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.12"/>
    <path d="M50,4 C18,4 6,22 6,52 C6,78 22,90 36,93" 
          fill="none" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.12"/>
    <path d="M74,16 C90,28 92,44 84,62 C76,78 62,86 50,85" 
          fill="none" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.25"/>
    <path d="M26,16 C10,28 8,44 16,62 C24,78 38,86 50,85" 
          fill="none" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.25"/>
    <path d="M66,28 C80,38 80,54 70,66 C62,75 54,78 50,76" 
          fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
    <path d="M34,28 C20,38 20,54 30,66 C38,75 46,78 50,76" 
          fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.4"/>

    <!-- Yellow accent arcs -->
    <path d="M74,16 C90,28 92,44 84,62" 
          fill="none" stroke="#eab308" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <path d="M26,16 C10,28 8,44 16,62" 
          fill="none" stroke="#eab308" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>

    <!-- Eye wall -->
    <circle cx="50" cy="52" r="16" fill="rgba(0,0,0,0.2)"/>
    <circle cx="50" cy="52" r="13" fill="rgba(255,255,255,0.15)"/>

    <!-- Eye -->
    <circle cx="50" cy="52" r="7" fill="#eab308"/>
    <circle cx="50" cy="52" r="3.5" fill="white"/>

    <!-- Tiny house in eye -->
    <polygon points="50,46 56,50 56,57 44,57 44,50" fill="rgba(255,255,255,0.6)"/>
    <polygon points="50,43 58,50 42,50" fill="#eab308" opacity="0.95"/>
  </g>

  <!-- Divider -->
  <line x1="118" y1="12" x2="118" y2="98" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- Text (white on teal) -->
  <text x="132" y="50" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="40" fill="white" letter-spacing="-1">HO</text>
  <text x="218" y="50" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="40" fill="#eab308" letter-spacing="-1">.com</text>
  <text x="133" y="72" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="15" fill="rgba(255,255,255,0.75)" letter-spacing="5">insurance</text>
  <text x="133" y="90" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="9" fill="rgba(255,255,255,0.45)" letter-spacing="2">FLORIDA HOME INSURANCE SPECIALISTS</text>
</svg>
