<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 110" width="480" height="110">
  <defs>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#ccfbf1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="480" height="110" fill="white"/>

  <!-- === HURRICANE ICON === -->
  <g transform="translate(8,5)">

    <!-- Outer spiral band 1 -->
    <path d="M50,4 C85,4 96,20 96,52 C96,78 80,90 65,93" 
          fill="none" stroke="#0f766e" stroke-width="10" stroke-linecap="round" opacity="0.15"/>
    <path d="M50,4 C85,4 96,20 96,52 C96,78 80,90 65,93" 
          fill="none" stroke="#0f766e" stroke-width="6" stroke-linecap="round" opacity="0.3"/>

    <!-- Outer spiral band 2 -->
    <path d="M50,4 C18,4 6,22 6,52 C6,78 22,90 36,93" 
          fill="none" stroke="#0f766e" stroke-width="10" stroke-linecap="round" opacity="0.15"/>
    <path d="M50,4 C18,4 6,22 6,52 C6,78 22,90 36,93" 
          fill="none" stroke="#0f766e" stroke-width="6" stroke-linecap="round" opacity="0.3"/>

    <!-- Mid spiral band right -->
    <path d="M74,16 C90,28 92,44 84,62 C76,78 62,86 50,85" 
          fill="none" stroke="#0d9488" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
    <path d="M74,16 C90,28 92,44 84,62 C76,78 62,86 50,85" 
          fill="none" stroke="#eab308" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

    <!-- Mid spiral band left -->
    <path d="M26,16 C10,28 8,44 16,62 C24,78 38,86 50,85" 
          fill="none" stroke="#0d9488" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
    <path d="M26,16 C10,28 8,44 16,62 C24,78 38,86 50,85" 
          fill="none" stroke="#eab308" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

    <!-- Inner spiral right -->
    <path d="M66,28 C80,38 80,54 70,66 C62,75 54,78 50,76" 
          fill="none" stroke="#0f766e" stroke-width="7" stroke-linecap="round" opacity="0.6"/>

    <!-- Inner spiral left -->
    <path d="M34,28 C20,38 20,54 30,66 C38,75 46,78 50,76" 
          fill="none" stroke="#0f766e" stroke-width="7" stroke-linecap="round" opacity="0.6"/>

    <!-- Eye wall -->
    <circle cx="50" cy="52" r="16" fill="#0f766e"/>
    <circle cx="50" cy="52" r="13" fill="url(#eyeGlow)"/>

    <!-- Eye center -->
    <circle cx="50" cy="52" r="7" fill="#eab308" filter="url(#glow)"/>
    <circle cx="50" cy="52" r="4" fill="white"/>

    <!-- Small house in eye -->
    <polygon points="50,46 56,50 56,57 44,57 44,50" fill="#0f766e" opacity="0.7"/>
    <polygon points="50,43 58,50 42,50" fill="#eab308" opacity="0.9"/>

  </g>

  <!-- Divider -->
  <line x1="118" y1="12" x2="118" y2="98" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Text -->
  <text x="132" y="50" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="40" fill="#0f766e" letter-spacing="-1">HO</text>
  <text x="218" y="50" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="40" fill="#eab308" letter-spacing="-1">.com</text>
  <text x="133" y="72" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="15" fill="#475569" letter-spacing="5">insurance</text>
  <text x="133" y="90" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="9" fill="#94a3b8" letter-spacing="2">FLORIDA HOME INSURANCE SPECIALISTS</text>
</svg>
